site_name: PyDeck Docs
site_description: Documentation for PyDeck

site_url: https://docs.pydeck.no
repo_url: https://github.com/OPvault/pydeck-docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - content.code.copy
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Installation: index.md

  - Using PyDeck:
      - Marketplace: using/marketplace.md
      - Gradient backgrounds: using/gradient-backgrounds.md
      - Official plugins:
          - Discord: using/discord.md
          - Spotify: using/spotify.md

  - Plugin development:
      - Shared platform:
          - Authentication: plugin-development/platform/authentication.md
          - Web UI & Assets: plugin-development/platform/web-ui-and-assets.md
          - HTTP API Reference: plugin-development/platform/http-api-reference.md
      - PDK development:
          - Getting Started: plugin-development/pdk/getting-started.md
          - PDK Plugin Creator: plugin-development/catalog/pdk-create.md
          - Templates & Elements: plugin-development/pdk/templates-elements.md
          - Rendering: plugin-development/pdk/rendering.md
          - Runtime & Examples: plugin-development/pdk/runtime-examples.md
      - Classic plugins:
          - Getting Started: plugin-development/classic/getting-started.md
          - Core Development: plugin-development/classic/core.md
          - Examples & Tips: plugin-development/classic/examples.md
      - Catalog tools (pydeck-plugins repo):
          - Generate Manifest: plugin-development/catalog/generate-manifest.md
          - Release Stable: plugin-development/catalog/release-stable.md
          - Sync From PyDeck: plugin-development/catalog/sync-from-pydeck.md

  - Theme development:
      - Getting Started: theme-development/getting-started.md
      - CSS Reference: theme-development/css-reference.md
      - Loader & Examples: theme-development/loader-examples.md
      - Marketplace catalog workflows: theme-development/marketplace-catalog.md
