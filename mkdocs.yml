site_name: PyDeck Docs
site_description: Documentation for PyDeck

site_url: https://docs.pydeck.no
repo_url: https://github.com/OPvault/pydeck-docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
extra_css:
  - stylesheets/extra.css

extra_files:
  - CNAME

nav:
  - Home: index.md

  - PyDeck:
      - Marketplace Repo: pydeck/MARKETPLACE_REPO.md

  - Plugin Development:
      - Plugin Development:
          - Getting Started: pydeck/plugin-development/GETTING_STARTED.md
          - Core Development: pydeck/plugin-development/CORE.md
          - Authentication: pydeck/plugin-development/AUTH.md
          - UI & Assets: pydeck/plugin-development/UI_ASSETS.md
          - API Reference: pydeck/plugin-development/API_REFERENCE.md
          - Examples & Tips: pydeck/plugin-development/EXAMPLES.md
      - PDK Development:
          - Getting Started: pydeck/pdk-development/GETTING_STARTED.md
          - Templates & Elements: pydeck/pdk-development/TEMPLATES_ELEMENTS.md
          - Rendering: pydeck/pdk-development/RENDERING.md
          - Runtime & Examples: pydeck/pdk-development/RUNTIME_EXAMPLES.md
      - fields.xml Reference: pydeck/FIELDS_XML.md
      - Gradient Backgrounds: pydeck/GRADIENT_BACKGROUNDS.md
      - Release Stable: pydeck-plugins/RELEASE_STABLE.md
      - Sync From PyDeck: pydeck-plugins/SYNC_FROM_PYDECK.md

  - Themes Development:
      - Getting Started: pydeck/theme-development/GETTING_STARTED.md
      - CSS Reference: pydeck/theme-development/CSS_REFERENCE.md
      - Loader & Examples: pydeck/theme-development/LOADER_EXAMPLES.md
      - Generate Manifest: pydeck-plugins/GENERATE_MANIFEST.md
      - Release Stable: pydeck-plugins/RELEASE_STABLE.md
      - Sync From PyDeck: pydeck-plugins/SYNC_FROM_PYDECK.md

  - PyDeck Official Plugins:
      - Discord Setup: pydeck/DISCORD_SETUP.md
      - Spotify Setup: pydeck/SPOTIFY_SETUP.md